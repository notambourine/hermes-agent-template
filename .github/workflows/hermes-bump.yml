# Daily check for a new Hermes release. When upstream cuts one, opens a draft PR
# bumping the HERMES_REF pin in the Dockerfile, with the release notes in the PR
# body. Merging the PR triggers Railway's GitHub auto-deploy, which rebuilds the
# image against the new tag.
#
# Requires: Settings → Actions → General → "Allow GitHub Actions to create and
# approve pull requests" enabled on this repo.
#
# Security note: tag names and release bodies come from the upstream repo (third-
# party input). They are passed through env vars / files, never interpolated into
# run: blocks via ${{ }}.
name: hermes-release-bump

on:
  schedule:
    - cron: "23 13 * * *" # daily, after Nous's usual release window
  workflow_dispatch: {}

# Serialize runs so a manual dispatch can't race the scheduled run — both push the
# same hermes-bump/<tag> branch. Let the in-flight run finish rather than cancel.
concurrency:
  group: hermes-release-bump
  cancel-in-progress: false

# Default-deny at the workflow level; the single job grants exactly what it needs.
permissions: {}

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the bump branch
      pull-requests: write # open the draft PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Don't bake GITHUB_TOKEN into .git/config (artipacked). The push step
          # below re-auths explicitly via `gh auth setup-git`.
          persist-credentials: false

      - name: Compare pinned ref to latest release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current="$(sed -n 's/^ARG HERMES_REF=//p' Dockerfile)"
          latest="$(gh api repos/NousResearch/hermes-agent/releases/latest --jq .tag_name)"
          echo "current=${current} latest=${latest}"
          {
            echo "current=${current}"
            echo "latest=${latest}"
          } >> "$GITHUB_OUTPUT"

      - name: Open draft bump PR
        if: steps.check.outputs.current != steps.check.outputs.latest
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT: ${{ steps.check.outputs.current }}
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          branch="hermes-bump/${LATEST}"

          if [ "$(gh pr list --head "${branch}" --state open --json number --jq length)" != "0" ]; then
            echo "Bump PR for ${LATEST} already open — nothing to do."
            exit 0
          fi

          # Package semver at the new tag (tags are date-based; humans think in semver).
          semver="$(curl -fsSL "https://raw.githubusercontent.com/NousResearch/hermes-agent/${LATEST}/pyproject.toml" \
            | sed -n 's/^version = "\(.*\)"/\1/p' | head -1)"

          # Re-establish push auth dropped by persist-credentials: false. Routes
          # git's HTTPS auth through the gh credential helper (uses GH_TOKEN),
          # keeping the token out of .git/config and out of remote URLs.
          gh auth setup-git

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          sed -i "s|^ARG HERMES_REF=.*|ARG HERMES_REF=${LATEST}|" Dockerfile
          git commit -am "chore: bump Hermes ${CURRENT} -> ${LATEST} (${semver})"
          git push -u origin "${branch}"

          # shellcheck disable=SC2016  # backticks are literal markdown code spans
          {
            printf 'Bumps the pinned Hermes release: `%s` → `%s` (package %s).\n\n' "${CURRENT}" "${LATEST}" "${semver}"
            printf '**Before merging, scan the release notes for changes to CLI flags used in `start.sh`**\n'
            printf '(`hermes dashboard`, `hermes gateway run`) — a removed flag crash-loops the container.\n\n'
            printf '[Full release notes](https://github.com/NousResearch/hermes-agent/releases/tag/%s)\n\n---\n\n' "${LATEST}"
            gh api "repos/NousResearch/hermes-agent/releases/tags/${LATEST}" --jq .body | head -c 8000
          } > /tmp/pr-body.md

          gh pr create --draft \
            --title "chore: bump Hermes to ${LATEST} (${semver})" \
            --body-file /tmp/pr-body.md
