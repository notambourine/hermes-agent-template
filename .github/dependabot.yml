# Dependabot — fleet convention (Mon & Wed 09:00 America/Chicago).
# minor+patch collapse into one grouped PR; majors get individual PRs.
# Cooldown (3d / 7d majors) holds back too-fresh releases; CVEs fast-track.
#
# Scope here: CI action pins + the Docker base image. The Hermes release pin
# (ARG HERMES_REF in the Dockerfile) is an ARG, not a FROM tag — Dependabot
# can't see it; hermes-bump.yml owns that bump.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      cronjob: "0 9 * * 1,3"
      timezone: America/Chicago
    cooldown:
      default-days: 3
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: cron
      cronjob: "0 9 * * 1,3"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    # majors are unmatched by any group -> individual PRs (one branch each)
